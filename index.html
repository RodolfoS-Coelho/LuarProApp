<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Studio Luar Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#C8748A;--rose-d:#A8566C;--rose-l:#F5E6EA;--rose-xl:#FDF1F4;
  --gold:#C9A96E;--gold-l:#F7F1E8;
  --ink:#1C1C2E;--ink2:#3D3D55;--ink3:#7A7A96;
  --bg:#F4F2F6;--white:#FFF;
  --green:#4CAF7D;--gl:#EAF7EF;
  --red:#E05C6A;--rl:#FDEEF0;
  --blue:#4A90D9;--bl:#E6F1FB;
  --border:#EDE8ED;
  --sh:0 2px 12px rgba(28,28,46,.08);
  --shm:0 4px 20px rgba(28,28,46,.13);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* Layout */
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink)}.logo em{color:var(--rose);font-style:normal}
.page{flex:1;padding:14px;max-width:860px;margin:0 auto;width:100%;padding-bottom:86px}
.bnav{background:var(--white);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;box-shadow:0 -2px 10px rgba(28,28,46,.07);overflow-x:auto}
.nbtn{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;color:var(--ink3);font-size:9px;font-weight:600;border:none;background:none;gap:3px;transition:color .15s;letter-spacing:.2px}
.nbtn.on{color:var(--rose)}.nbtn .ni{font-size:19px;line-height:1}
/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--sh)}
.card+.card{margin-top:10px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kcard{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 12px;box-shadow:var(--sh);cursor:pointer;transition:transform .15s,box-shadow .15s}
.kcard:hover{transform:translateY(-2px);box-shadow:var(--shm)}
.klabel{font-size:11px;color:var(--ink3);font-weight:500;margin-bottom:5px}
.kval{font-size:22px;font-weight:800;color:var(--ink);line-height:1}
.ksub{font-size:11px;color:var(--ink3);margin-top:4px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.brose{background:linear-gradient(135deg,var(--rose),var(--rose-d));color:#fff}.brose:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.bgreen{background:var(--green);color:#fff}.bgreen:hover:not(:disabled){opacity:.9}
.bred{background:var(--red);color:#fff}
.bsoft{background:var(--rose-l);color:var(--rose-d)}.bsoft:hover:not(:disabled){background:#eedde3}
.bghost{background:none;color:var(--ink2);border:1.5px solid var(--border)}.bghost:hover:not(:disabled){background:var(--bg)}
.bgold{background:var(--gold);color:#fff}
.bsm{padding:7px 13px;font-size:12px;border-radius:9px}
.bxs{padding:4px 9px;font-size:11px;border-radius:7px}
.bfull{width:100%}
/* Forms */
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fi,.fs,.fta{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--ink);background:var(--white);outline:none;transition:border .18s;font-family:'Inter',sans-serif}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--rose)}
.fta{resize:vertical;min-height:68px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* List */
.li{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}
.lil{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.lit{font-size:14px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lis{font-size:12px;color:var(--ink3)}
.lir{text-align:right;flex-shrink:0;margin-left:10px}
.li.tap{cursor:pointer;border-radius:9px;padding:10px 8px;margin:0 -8px;transition:background .1s}.li.tap:hover{background:var(--rose-xl)}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.bg{background:var(--gl);color:#2E7D52}.br{background:var(--rl);color:#C0344A}
.bgo{background:var(--gold-l);color:#7A5800}.brs{background:var(--rose-l);color:var(--rose-d)}
.bgy{background:#F0F0F5;color:var(--ink3)}.bbl{background:var(--bl);color:#1a5fa8}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:91vh;display:flex;flex-direction:column;animation:mup .22s ease}
@keyframes mup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--white);border-radius:20px 20px 0 0;position:sticky;top:0;z-index:2}
.mtitle{font-size:16px;font-weight:700;color:var(--ink)}
.mclose{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:15px;color:var(--ink3);display:flex;align-items:center;justify-content:center}
.mbody{padding:14px 18px 36px;overflow-y:auto;flex:1}
@media(min-width:580px){.modal{border-radius:20px;margin-bottom:30px}.overlay{align-items:center}.kgrid{grid-template-columns:repeat(4,1fr)}.page{padding:20px;padding-bottom:96px}}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tab{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;background:var(--bg);color:var(--ink3);transition:all .15s}
.tab.on{background:var(--rose);color:#fff}
/* Search */
.swrap{position:relative}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.si{width:100%;padding:10px 12px 10px 34px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--white);transition:border .18s;font-family:'Inter',sans-serif}
.si:focus{border-color:var(--rose)}
/* Dropdown */
.drop{border:1.5px solid var(--border);border-radius:10px;background:var(--white);max-height:210px;overflow-y:auto;margin-top:5px;box-shadow:var(--shm)}
.drow{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.drow:last-child{border-bottom:none}
.drow:hover{background:var(--rose-xl)}
.drow b{display:block;font-size:13px;font-weight:500;color:var(--ink)}
.drow span{font-size:11px;color:var(--ink3)}
/* PDV */
.pdvbox{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;margin-bottom:18px}
.pdvsec{padding:14px 16px;border-bottom:1px solid var(--border)}.pdvsec:last-child{border-bottom:none}
.steprow{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:11px}
.stepnum{width:20px;height:20px;border-radius:50%;background:var(--rose);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.stepnum.done{background:var(--green)}
.crow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.qctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qbtn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:600}
.qinp{width:34px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:3px;font-size:13px;font-family:'Inter',sans-serif}
/* Payment chips */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;padding:7px 13px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--ink2);transition:all .15s}
.chip.on{background:var(--rose);color:#fff;border-color:var(--rose-d)}
/* Installments */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.ibtn{padding:8px 4px;border-radius:9px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;text-align:center;font-size:11px;font-weight:600;color:var(--ink2);transition:all .15s;font-family:'Inter',sans-serif;line-height:1.4}
.ibtn.on{border-color:var(--rose);background:var(--rose-l);color:var(--rose-d)}
/* Toggle */
.togrow{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.tog{flex:1;padding:9px 6px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--white);color:var(--ink3);transition:all .15s;font-family:'Inter',sans-serif}
.tog.on{background:var(--rose);color:#fff}
/* Total strip */
.tstrip{background:var(--rose-xl);border-radius:11px;padding:12px 14px;margin:10px 0}
.tline{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.tline:last-child{margin-bottom:0;font-weight:800;font-size:17px;color:var(--rose)}
/* Variation sheet */
.vsheet{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--white);border-radius:20px 20px 0 0;padding:18px 18px 44px;box-shadow:0 -4px 24px rgba(28,28,46,.15);animation:mup .2s ease;max-width:560px;margin:0 auto}
.vchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.vchip{padding:10px 18px;border-radius:99px;border:2px solid var(--border);background:var(--white);cursor:pointer;transition:all .15s}
.vchip:hover:not(.vout){border-color:var(--rose);background:var(--rose-xl)}
.vout{opacity:.4;cursor:not-allowed;text-decoration:line-through}
/* Camera */
.camlay{position:fixed;inset:0;background:#000;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center}
.camframe{position:absolute;width:220px;height:140px;border:3px solid var(--rose);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
/* Pill */
.pill{display:inline-block;padding:2px 8px;border-radius:99px;background:var(--bl);color:var(--blue);font-size:10px;font-weight:700;margin:1px}
/* Submenu */
.smitem{display:flex;align-items:center;padding:13px 12px;border-radius:12px;cursor:pointer;border:1px solid var(--border);background:var(--white);margin-bottom:8px;transition:background .13s}
.smitem:hover{background:var(--rose-xl)}
.smico{font-size:22px;margin-right:12px;flex-shrink:0}
.smtxt{flex:1}.smtitle{font-weight:600;font-size:14px;color:var(--ink)}.smsub{font-size:12px;color:var(--ink3);margin-top:1px}
/* Stock bar */
.sbwrap{background:var(--border);border-radius:99px;height:4px;margin-top:5px}
.sbfill{height:4px;border-radius:99px}
/* Misc */
.divider{border:none;border-top:1px solid var(--border);margin:13px 0}
.empty{text-align:center;padding:36px 16px;color:var(--ink3)}
.eico{font-size:44px;margin-bottom:10px}.etitle{font-size:15px;font-weight:600;color:var(--ink2);margin-bottom:3px}
.scap{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin:16px 0 8px}
.hl{background:var(--rose-xl);border-radius:10px;padding:10px 13px;margin-bottom:11px;font-size:13px}
.fab{position:fixed;bottom:74px;right:18px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-d));color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(200,116,138,.5);cursor:pointer;border:none;z-index:30;transition:transform .15s}
.fab:hover{transform:scale(1.08)}
.rcpt{font-family:'Courier New',monospace;font-size:12px;line-height:1.9;background:#fff;padding:14px;border-radius:8px;border:1px dashed var(--border)}
.rrow{display:flex;justify-content:space-between}
.rline{border-top:1px dashed #ccc;margin:5px 0}
.rctr{text-align:center}
.upbox{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border .2s}
.upbox:hover{border-color:var(--rose)}
.ph h1{font-size:20px;font-weight:800;color:var(--ink)}
.ph p{font-size:13px;color:var(--ink3);margin-top:2px}
.ph{margin-bottom:14px}
.sumbar{background:linear-gradient(135deg,#1C1C2E,#3D3D55);border-radius:14px;padding:16px;color:#fff;margin-bottom:14px}
</style>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

/* ─── Helpers ──────────────────────────────────────── */
const fmt    = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtD   = d => d ? new Date(d.length===10?d+'T12:00:00':d).toLocaleDateString('pt-BR') : '—';
const today  = () => new Date().toISOString().split('T')[0];
const nowISO = () => new Date().toISOString();
const month0 = () => new Date().toISOString().slice(0,7);
const genId  = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const genSKU = (name='') => (name.replace(/[^A-Za-z]/g,'').toUpperCase().slice(0,3)||'PRD')+'-'+Math.floor(Math.random()*9000+1000);

function useDB(k,init){
  const [v,set]=useState(()=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):init;}catch{return init;}});
  const save=useCallback(fn=>{set(prev=>{const next=typeof fn==='function'?fn(prev):fn;try{localStorage.setItem(k,JSON.stringify(next));}catch{}return next;});},[k]);
  return [v,save];
}

/* ─── Supabase ─────────────────────────────────────── */
const SUPA_URL='https://etjsjwpoptrwmxodtknh.supabase.co';
const SUPA_KEY='sb_publishable_1Fl2gc_WopoxFiE3bWMn1Q_uotrPZY0';
const supa=async(path,opts={})=>{
  const res=await fetch(`${SUPA_URL}/rest/v1/${path}`,{
    ...opts,
    headers:{
      'apikey':SUPA_KEY,
      'Authorization':`Bearer ${SUPA_KEY}`,
      'Content-Type':'application/json',
      'Prefer':'return=representation',
      ...opts.headers,
    },
  });
  if(!res.ok) throw new Error(await res.text());
  const text=await res.text();
  return text?JSON.parse(text):[];
};
const UPSERT_H={headers:{'Prefer':'resolution=merge-duplicates,return=representation'}};

async function syncDiff(table,prev,next,toRow){
  const nextIds=new Set(next.map(x=>x.id));
  for(const r of prev){ if(!nextIds.has(r.id)) await supa(`${table}?id=eq.${r.id}`,{method:'DELETE'}); }
  const changed=next.filter(x=>{const old=prev.find(p=>p.id===x.id);return !old||JSON.stringify(old)!==JSON.stringify(x);});
  if(changed.length) await supa(table,{method:'POST',...UPSERT_H,body:JSON.stringify(changed.map(toRow))});
}

/* useDB com sincronização Supabase: estado local/localStorage continua a fonte
   imediata (PDV permanece síncrono); a nuvem é mesclada em background e passa
   a ser a fonte de verdade após a primeira sincronização bem-sucedida. */
function useCloudDB(table,k,init,map={}){
  const toRow=map.toRow||(x=>x);
  const fromRow=map.fromRow||(x=>x);
  const [v,set]=useState(()=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):init;}catch{return init;}});

  useEffect(()=>{
    (async()=>{
      const synced=localStorage.getItem(`slp_sync_${table}_v6`);
      try{
        const cloud=(await supa(`${table}?select=*`)).map(fromRow);
        let next;
        if(!synced){
          if(cloud.length===0){
            if(v.length) await supa(table,{method:'POST',...UPSERT_H,body:JSON.stringify(v.map(toRow))});
            next=v;
          }else{
            const cloudIds=new Set(cloud.map(x=>x.id));
            const onlyLocal=v.filter(x=>!cloudIds.has(x.id));
            if(onlyLocal.length) await supa(table,{method:'POST',...UPSERT_H,body:JSON.stringify(onlyLocal.map(toRow))});
            next=[...cloud,...onlyLocal];
          }
          localStorage.setItem(`slp_sync_${table}_v6`,'1');
        }else{
          next=cloud;
        }
        next=[...next].sort((a,b)=>a.id<b.id?-1:a.id>b.id?1:0);
        set(next);
        try{localStorage.setItem(k,JSON.stringify(next));}catch{}
      }catch{ /* offline ou tabela ainda não existe — mantém localStorage */ }
    })();
  },[]);

  const save=useCallback(fn=>{
    set(prev=>{
      const next=typeof fn==='function'?fn(prev):fn;
      try{localStorage.setItem(k,JSON.stringify(next));}catch{}
      syncDiff(table,prev,next,toRow).catch(()=>{});
      return next;
    });
  },[table,k]);

  return [v,save];
}

/* Mapeamento de campos: camelCase (app) ↔ snake_case (Supabase) */
const ROW_VARIACOES={
  toRow:x=>({id:x.id,pid:x.pid,label:x.label,sku:x.sku,stock:x.stock,min_stock:x.minStock,cost:x.cost,price:x.price}),
  fromRow:x=>({id:x.id,pid:x.pid,label:x.label,sku:x.sku,stock:x.stock,minStock:x.min_stock,cost:x.cost,price:x.price}),
};
const ROW_VENDAS={
  toRow:x=>({id:x.id,cid:x.cid,cname:x.cname,items:x.items,subtotal:x.sub,disc:x.disc,frt:x.frt,frt_amt:x.frtAmt,frt_by:x.frtBy,tax_rate:x.taxRate,tax_amt:x.taxAmt,tax_by:x.taxBy,total:x.total,pay:x.pay,inst:x.inst,status:x.status,notes:x.notes,date:x.date}),
  fromRow:x=>({id:x.id,cid:x.cid,cname:x.cname,items:x.items,sub:x.subtotal,disc:x.disc,frt:x.frt,frtAmt:x.frt_amt,frtBy:x.frt_by,taxRate:x.tax_rate,taxAmt:x.tax_amt,taxBy:x.tax_by,total:x.total,pay:x.pay,inst:x.inst,status:x.status,notes:x.notes,date:x.date}),
};
const ROW_CONTAS={
  toRow:x=>({id:x.id,desc:x.desc,amount:x.amount,due_date:x.dueDate||null,cat:x.cat,sup:x.sup,paid:x.paid}),
  fromRow:x=>({id:x.id,desc:x.desc,amount:x.amount,dueDate:x.due_date,cat:x.cat,sup:x.sup,paid:x.paid}),
};
const ROW_CLIENTES={
  toRow:x=>({...x,birthday:x.birthday||null}),
  fromRow:x=>x,
};

/* ─── Auth ─────────────────────────────────────────── */
const AK='slp_auth_v6';
const loadU=()=>{try{const s=localStorage.getItem(AK);return s?JSON.parse(s):[{id:'u1',name:'Studio Luar',initials:'SL',email:'loja@studioluar.com',password:'luar2024',role:'admin'},{id:'u2',name:'Sócia',initials:'SC',email:'socia@studioluar.com',password:'socia2024',role:'admin'}];}catch{return[];}};
const saveU=u=>{try{localStorage.setItem(AK,JSON.stringify(u));}catch{}};

const CFG0={storeName:'Studio Luar Pro',razaoSocial:'',cnpj:'',endereco:'',cidade:'',uf:'',cep:'',logo:'',taxPix:0,taxDebito:1.5,payMethods:['pix','dinheiro','debito','credito','fiado'],tiers:[{p:1,t:2.5},{p:2,t:3.5},{p:3,t:4.5},{p:4,t:5.5},{p:5,t:6.5},{p:6,t:7.5}]};
const CATS0=['Cílios','Pinças','Adesivos','Esmaltes','Acessórios','Outros'];

/* ─── Shared Components ────────────────────────────── */
function Modal({title,onClose,children}){
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mhead"><span className="mtitle">{title}</span><button className="mclose" onClick={onClose}>✕</button></div>
        <div className="mbody">{children}</div>
      </div>
    </div>
  );

/* ─── PDV ──────────────────────────────────────────── */
function PDV({prods,vars,setVars,clis,setClis,vendas,setVendas,txs,setTxs,cfg}){
  const [cli,setCli]   =useState(null);
  const [cSrch,setCS]  =useState('');
  const [cart,setCart] =useState([]);
  const [pSrch,setPS]  =useState('');
  const [pay,setPay]   =useState('pix');
  const [inst,setInst] =useState(1);
  const [notes,setN]   =useState('');
  const [dType,setDT]  =useState('R$');
  const [dVal,setDV]   =useState('');
  const [frt,setFrt]   =useState('');
  const [frtBy,setFB]  =useState('cli');
  const [taxBy,setTB]  =useState('loja');
  const [vPick,setVP]  =useState(null); // {prod, vars[]}
  const [newC,setNewC] =useState(false);
  const [recibo,setRec]=useState(null);
  const [camOn,setCam] =useState(false);
  const [lSrch,setLS]  =useState('');
  const [lTab,setLT]   =useState('all');
  const cRef=useRef(null);const pRef=useRef(null);
  const vidRef=useRef(null);const strmRef=useRef(null);

  useEffect(()=>{ if(!cli) setTimeout(()=>cRef.current?.focus(),80); },[cli]);
  useEffect(()=>{ if(cli)  setTimeout(()=>pRef.current?.focus(),80); },[cli]);

  const sub    = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const discA  = dVal>0?(dType==='%'?sub*(+dVal/100):+dVal):0;
  const frtA   = frt>0&&frtBy==='cli'?+frt:0;
  const taxR   = (()=>{if(pay==='pix')return cfg.taxPix||0;if(pay==='debito')return cfg.taxDebito||1.5;if(pay==='credito'){const t=(cfg.tiers||[]).find(x=>x.p===inst);return t?t.t:2.5;}return 0;})();
  const base   = sub-discA+frtA;
  const taxA   = taxBy==='cli'?base*(taxR/100):0;
  const total  = base+taxA;

  const addItem=(v,p)=>{
    setCart(prev=>{const ex=prev.find(i=>i.vid===v.id);if(ex)return prev.map(i=>i.vid===v.id?{...i,qty:i.qty+1}:i);return [...prev,{vid:v.id,pid:p.id,pname:p.name,vlabel:v.label,sku:v.sku,price:v.price,qty:1}];});
    setPS('');
  };
  const rmItem =vid=>setCart(p=>p.filter(i=>i.vid!==vid));
  const setQty =(vid,q)=>{if(q<=0)return rmItem(vid);setCart(p=>p.map(i=>i.vid===vid?{...i,qty:q}:i));};

  // SKU match → insere direto
  const handlePS=val=>{
    setPS(val);
    const bysku=vars.find(v=>v.sku?.toLowerCase()===val.trim().toLowerCase());
    if(bysku){const p=prods.find(x=>x.id===bysku.pid);if(p){addItem(bysku,p);return;}}
  };

  const handleSelProd=p=>{
    const pv=vars.filter(v=>v.pid===p.id);
    if(!pv.length)return;
    if(pv.length===1){addItem(pv[0],p);}
    else setVP({prod:p,vars:pv});
    setPS('');
  };

  const clear=()=>{setCli(null);setCS('');setCart([]);setPS('');setPay('pix');setInst(1);setN('');setDT('R$');setDV('');setFrt('');setFB('cli');setTB('loja');};

  const finalizar=()=>{
    if(!cli||cart.length===0)return;
    const isPend=pay==='fiado';
    const lojaTax=taxBy==='loja'&&taxR>0?base*(taxR/100):0;
    const lojaFrt=frtBy==='loja'&&frt>0?+frt:0;
    const v={id:genId(),cid:cli.id,cname:cli.name,items:[...cart],sub,disc:discA,frt:+frt||0,frtAmt:frtA,frtBy,taxRate:taxR,taxAmt:taxA,taxBy,total,pay,inst:pay==='credito'?inst:1,status:isPend?'pending':'paid',date:nowISO(),notes};
    // 1) Salvar
    setVendas(p=>[...p,v]);
    setVars(p=>p.map(x=>{const ci=cart.find(i=>i.vid===x.id);return ci?{...x,stock:Math.max(0,x.stock-ci.qty)}:x;}));
    if(isPend) setClis(p=>p.map(c=>c.id===cli.id?{...c,debt:(c.debt||0)+total}:c));
    else setTxs(p=>[...p,{id:genId(),type:'rec',cat:'Venda',desc:`Venda — ${cli.name}`,amount:total,date:nowISO(),pay}]);
    if(lojaTax>0) setTxs(p=>[...p,{id:genId(),type:'desp',cat:'Taxa cartão',desc:`Taxa ${pay} — ${cli.name}`,amount:lojaTax,date:nowISO()}]);
    if(lojaFrt>0) setTxs(p=>[...p,{id:genId(),type:'desp',cat:'Frete',desc:`Frete — ${cli.name}`,amount:lojaFrt,date:nowISO()}]);
    // 2) Mostrar recibo
    setRec(v);
    // 3) Limpar imediatamente (não depende de callback)
    clear();
  };

  const payFiado=v=>{setVendas(p=>p.map(x=>x.id===v.id?{...x,status:'paid'}:x));setClis(p=>p.map(c=>c.id===v.cid?{...c,debt:Math.max(0,(c.debt||0)-v.total)}:c));setTxs(p=>[...p,{id:genId(),type:'rec',cat:'Fiado recebido',desc:`Fiado — ${v.cname}`,amount:v.total,date:nowISO(),pay:'pix'}]);};

  const fCli=clis.filter(c=>c.name?.toLowerCase().includes(cSrch.toLowerCase())||(c.cpf&&c.cpf.includes(cSrch)));
  const fProd=useMemo(()=>{if(!pSrch)return[];const q=pSrch.toLowerCase();return prods.filter(p=>p.name?.toLowerCase().includes(q)||p.brand?.toLowerCase().includes(q));},[pSrch,prods]);
  const actPay=cfg.payMethods||['pix','dinheiro','debito','credito','fiado'];
  const payOpts=[{id:'pix',l:'PIX'},{id:'dinheiro',l:'Dinheiro'},{id:'debito',l:'Débito'},{id:'credito',l:'Crédito'},{id:'fiado',l:'Fiado'}].filter(x=>actPay.includes(x.id));
  const tiers=cfg.tiers||CFG0.tiers;

  const filtV=useMemo(()=>{let l=[...vendas].reverse();if(lTab==='fiado')l=l.filter(v=>v.pay==='fiado');if(lTab==='paid')l=l.filter(v=>v.status==='paid'&&v.pay!=='fiado');if(lSrch)l=l.filter(v=>v.cname?.toLowerCase().includes(lSrch.toLowerCase()));return l;},[vendas,lTab,lSrch]);

  // Camera
  const startCam=async()=>{setCam(true);try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});strmRef.current=s;if(vidRef.current)vidRef.current.srcObject=s;}catch(e){alert('Câmera não disponível: '+e.message);setCam(false);}};
  const stopCam=()=>{strmRef.current?.getTracks().forEach(t=>t.stop());strmRef.current=null;setCam(false);};
  const scanLoop=useCallback(async()=>{
    if(!('BarcodeDetector' in window)){const s=prompt('Digite o SKU:');if(s)handlePS(s);stopCam();return;}
    const bd=new BarcodeDetector({formats:['code_128','code_39','ean_13','ean_8','qr_code']});
    const loop=async()=>{if(!vidRef.current||!strmRef.current)return;try{const cs=await bd.detect(vidRef.current);if(cs.length){stopCam();handlePS(cs[0].rawValue);}else requestAnimationFrame(loop);}catch{requestAnimationFrame(loop);}};
    requestAnimationFrame(loop);
  },[vars,prods]);
  useEffect(()=>{if(camOn&&vidRef.current)vidRef.current.onloadeddata=()=>scanLoop();},[camOn,scanLoop]);

  return(<div>
    <div className="pdvbox">
      {/* Passo 1: Cliente */}
      <div className="pdvsec">
        <div className="steprow"><span className={`stepnum ${cli?'done':''}`}>{cli?'✓':'1'}</span>Cliente</div>
        {cli
          ?<div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}><Avatar name={cli.name} size={36}/><div><div style={{fontWeight:600,fontSize:14}}>{cli.name}</div><div style={{fontSize:12,color:'var(--ink3)'}}>{cli.phone}{cli.debt>0?` · Fiado: ${fmt(cli.debt)}`:''}</div></div></div>
              <button className="btn bghost bsm" onClick={()=>{setCli(null);setCS('');}}>Trocar</button>
            </div>
          :<>
            <input ref={cRef} className="fi" autoFocus placeholder="Buscar cliente por nome ou CPF..." value={cSrch} onChange={e=>setCS(e.target.value)}/>
            {cSrch.length>0&&<div className="drop">
              {fCli.length===0?<div className="drow"><span style={{color:'var(--ink3)'}}>Não encontrado — </span><button className="btn bxs bsoft" onClick={()=>setNewC(true)} style={{marginLeft:6}}>+ Cadastrar</button></div>
              :fCli.map(c=><div key={c.id} className="drow" onClick={()=>{setCli(c);setCS('');}}><b>{c.name}</b><span>{c.phone}{c.cpf?` · ${c.cpf}`:''}</span></div>)}
            </div>}
            <button className="btn bsoft bsm" style={{marginTop:8}} onClick={()=>setNewC(true)}>+ Novo cliente</button>
          </>
        }
      </div>

      {/* Passo 2: Produto */}
      <div className="pdvsec">
        <div className="steprow"><span className={`stepnum ${cart.length>0?'done':''}`}>{cart.length>0?'✓':'2'}</span>Produto</div>
        <div style={{position:'relative',marginBottom:8}}>
          <input ref={pRef} className="fi" placeholder="Digitar nome  ou  📷 bipar código de barras..." value={pSrch} onChange={e=>handlePS(e.target.value)} style={{paddingRight:42}}/>
          <button onClick={startCam} title="Câmera" style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:20}}>📷</button>
        </div>
        {pSrch.length>0&&<div className="drop" style={{marginBottom:8}}>
          {fProd.length===0?<div className="drow"><span style={{color:'var(--ink3)'}}>Nenhum produto encontrado</span></div>
          :fProd.map(p=>{const pv=vars.filter(v=>v.pid===p.id);return(<div key={p.id} className="drow" onClick={()=>handleSelProd(p)}><b>{p.name}{p.brand?` (${p.brand})`:''}</b><span>{p.cat} · {pv.length} variação(ões)</span></div>);})}
        </div>}
        {cart.length>0&&<div style={{borderTop:'1px solid var(--border)',paddingTop:10}}>
          {cart.map(i=><div key={i.vid} className="crow">
            <div style={{flex:1,minWidth:0,marginRight:8}}>
              <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.pname} <span className="pill">{i.vlabel}</span></div>
              <div style={{fontSize:11,color:'var(--rose)'}}>{fmt(i.price)} · {fmt(i.price*i.qty)}</div>
            </div>
            <div className="qctrl">
              <button className="qbtn" onClick={()=>setQty(i.vid,i.qty-1)}>−</button>
              <input className="qinp" type="number" value={i.qty} min={1} onChange={e=>setQty(i.vid,+e.target.value)}/>
              <button className="qbtn" onClick={()=>setQty(i.vid,i.qty+1)}>+</button>
              <button onClick={()=>rmItem(i.vid)} style={{marginLeft:4,background:'var(--rl)',color:'var(--red)',border:'none',borderRadius:6,width:22,height:22,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
            </div>
          </div>)}
          <div style={{display:'flex',justifyContent:'space-between',paddingTop:9,fontWeight:700,fontSize:15}}><span>Subtotal</span><span>{fmt(sub)}</span></div>
        </div>}
      </div>

      {/* Passo 3: Pagamento */}
      {cart.length>0&&<div className="pdvsec">
        <div className="steprow"><span className="stepnum">3</span>Pagamento &amp; Valores</div>

        <div className="fg"><label className="fl">Desconto</label>
          <div style={{display:'flex',gap:8}}>
            <div className="togrow" style={{width:82,flexShrink:0}}><button className={`tog ${dType==='R$'?'on':''}`} onClick={()=>setDT('R$')}>R$</button><button className={`tog ${dType==='%'?'on':''}`} onClick={()=>setDT('%')}>%</button></div>
            <input className="fi" type="number" placeholder="0" value={dVal} onChange={e=>setDV(e.target.value)} style={{flex:1}}/>
          </div>
        </div>

        <div className="fg"><label className="fl">Frete (R$)</label>
          <div style={{display:'flex',gap:8}}>
            <input className="fi" type="number" placeholder="0,00" value={frt} onChange={e=>setFrt(e.target.value)} style={{flex:1}}/>
            <div className="togrow" style={{width:132,flexShrink:0}}><button className={`tog ${frtBy==='cli'?'on':''}`} onClick={()=>setFB('cli')}>Cliente</button><button className={`tog ${frtBy==='loja'?'on':''}`} onClick={()=>setFB('loja')}>Loja</button></div>
          </div>
          <div style={{fontSize:11,color:'var(--ink3)',marginTop:3}}>{frtBy==='loja'?'Despesa da loja (não cobra cliente)':'Somado ao total'}</div>
        </div>

        <div className="fg"><label className="fl">Pagamento</label>
          <div className="chips">{payOpts.map(m=><button key={m.id} className={`chip ${pay===m.id?'on':''}`} onClick={()=>{setPay(m.id);setInst(1);}}>{m.l}</button>)}</div>
        </div>

        {pay==='credito'&&<div className="fg"><label className="fl">Parcelamento</label>
          <div className="igrid">{tiers.map(t=><button key={t.p} className={`ibtn ${inst===t.p?'on':''}`} onClick={()=>setInst(t.p)}>{t.p}x<br/><b style={{fontSize:12}}>{fmt((sub-discA)/t.p)}</b><br/><span style={{fontSize:10,color:'var(--ink3)'}}>taxa {t.t}%</span></button>)}</div>
        </div>}

        {taxR>0&&pay!=='fiado'&&<div className="fg"><label className="fl">Taxa {taxR}%</label>
          <div className="togrow"><button className={`tog ${taxBy==='cli'?'on':''}`} onClick={()=>setTB('cli')}>Cobrar do cliente</button><button className={`tog ${taxBy==='loja'?'on':''}`} onClick={()=>setTB('loja')}>Absorver (loja)</button></div>
        </div>}

        <div className="tstrip">
          {discA>0&&<div className="tline"><span>Desconto</span><span style={{color:'var(--red)',fontWeight:700}}>−{fmt(discA)}</span></div>}
          {frtA>0&&<div className="tline"><span>Frete</span><span>+{fmt(frtA)}</span></div>}
          {taxA>0&&<div className="tline"><span>Taxa {taxR}%</span><span>+{fmt(taxA)}</span></div>}
          <div className="tline" style={{marginTop:6}}><span>Total</span><span>{fmt(total)}</span></div>
          {pay==='credito'&&inst>1&&<div style={{fontSize:11,color:'var(--ink3)',textAlign:'right'}}>{inst}x de {fmt(total/inst)}</div>}
        </div>

        <div className="fg"><label className="fl">Observações</label><textarea className="fta" placeholder="Notas..." value={notes} onChange={e=>setN(e.target.value)} style={{minHeight:48}}/></div>
        <div style={{display:'flex',gap:8}}><button className="btn bghost bsm" onClick={clear}>Limpar</button><button className="btn bgreen bfull" disabled={!cli||cart.length===0} onClick={finalizar}>✓ Confirmar Venda</button></div>
      </div>}
    </div>

    {/* Lista de vendas */}
    <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Histórico de Vendas</div>
    <div className="tabs">{[['all','Todas'],['paid','Pagas'],['fiado','Fiado']].map(([k,l])=><button key={k} className={`tab ${lTab===k?'on':''}`} onClick={()=>setLT(k)}>{l}</button>)}</div>
    <div className="swrap" style={{marginBottom:12}}><span className="sico">🔍</span><input className="si" placeholder="Buscar cliente..." value={lSrch} onChange={e=>setLS(e.target.value)}/></div>
    <div className="card">
      {filtV.length===0?<div className="empty"><div className="eico">🛒</div><div className="etitle">Nenhuma venda</div></div>
      :filtV.map(v=><div key={v.id} className="li tap">
        <div className="lil"><div className="lit">{v.cname}</div><div className="lis">{fmtD(v.date)} · {v.pay?.toUpperCase()}{v.inst>1?' '+v.inst+'x':''}</div></div>
        <div className="lir"><div style={{fontWeight:700,color:v.pay==='fiado'?'var(--gold)':'var(--green)'}}>{fmt(v.total)}</div>{v.status==='pending'?<button className="btn bsoft bxs" style={{marginTop:3}} onClick={()=>payFiado(v)}>Receber</button>:<span className="badge bg">Pago</span>}</div>
      </div>)}
    </div>

    {newC&&<Modal title="Novo Cliente" onClose={()=>setNewC(false)}><ClientForm onSave={c=>{setClis(p=>[...p,c]);setCli(c);setNewC(false);}}/></Modal>}
    {recibo&&<Recibo venda={recibo} cfg={cfg} onClose={()=>setRec(null)}/>}

    {/* Variation picker */}
    {vPick&&<>
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:250}} onClick={()=>setVP(null)}/>
      <div className="vsheet">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <div><div style={{fontWeight:700,fontSize:15}}>{vPick.prod.name}</div><div style={{fontSize:12,color:'var(--ink3)',marginTop:2}}>Selecione a variação</div></div>
          <button className="mclose" onClick={()=>setVP(null)}>✕</button>
        </div>
        <div className="vchips">
          {vPick.vars.map(v=>(
            <button key={v.id} className={`vchip ${v.stock<=0?'vout':''}`} onClick={()=>{if(v.stock<=0&&!confirm('Estoque zerado! Vender assim mesmo?'))return;addItem(v,vPick.prod);setVP(null);}}>
              <div style={{fontWeight:700,fontSize:14,color:'var(--ink)'}}>{v.label}</div>
              <div style={{fontSize:11,color:'var(--ink3)',marginTop:2}}>{fmt(v.price)} · est: {v.stock}</div>
            </button>
          ))}
        </div>
      </div>
    </>}

    {/* Camera */}
    {camOn&&<div className="camlay">
      <div style={{position:'relative',width:'100%',maxWidth:480}}><video ref={vidRef} autoPlay playsInline style={{width:'100%',borderRadius:10}}/><div className="camframe" style={{left:'50%',top:'50%',transform:'translate(-50%,-50%)'}}/></div>
      <div style={{marginTop:16,display:'flex',gap:12}}><button className="btn bghost" onClick={()=>{const s=prompt('Digitar SKU:');if(s)handlePS(s);stopCam();}}>✍️ SKU</button><button className="btn bred" onClick={stopCam}>✕ Fechar</button></div>
      <div style={{color:'rgba(255,255,255,.55)',fontSize:12,marginTop:8}}>Aponte para o código de barras</div>
    </div>}
  </div>);
}

/* ─── COMPRAS ──────────────────────────────────────── */
function Compras({prods,setProds,vars,setVars,cats,setTxs}){
  const [cprs,setCprs]=useCloudDB('compras','slp_cprs_v6',[]);
  const [modal,setModal]=useState(false);
  const [step,setStep]=useState(1);
  const [selP,setSelP]=useState(null);
  const [pSrch,setPS]=useState('');
  const [lote,setLote]=useState({});
  const [newPMod,setNPM]=useState(false);
  const [npf,setNPF]=useState({name:'',brand:'',cat:'',notes:''});
  const fP=useMemo(()=>{if(!pSrch)return[];const q=pSrch.toLowerCase();return prods.filter(p=>p.name?.toLowerCase().includes(q)||p.brand?.toLowerCase().includes(q));},[pSrch,prods]);

  const openProd=p=>{setSelP(p);const pvars=vars.filter(v=>v.pid===p.id);const init={};pvars.forEach(v=>{init[v.id]={qty:'',cost:'',sup:'',date:today()};});setLote(init);setStep(2);setPS('');};

  const saveNewP=()=>{if(!npf.name)return;const np={id:genId(),name:npf.name,brand:npf.brand,cat:npf.cat,notes:npf.notes};setProds(p=>[...p,np]);setNPM(false);setNPF({name:'',brand:'',cat:'',notes:''});openProd(np);};

  const salvar=()=>{
    let any=false;
    vars.filter(v=>v.pid===selP.id).forEach(v=>{
      const l=lote[v.id];if(!l?.qty||!l?.cost)return;
      any=true;
      const qty=+l.qty,cost=+l.cost;
      setCprs(p=>[...p,{id:genId(),vid:v.id,vlabel:v.label,pid:selP.id,pname:selP.name,qty,cost,sup:l.sup,date:l.date||today()}]);
      setVars(p=>p.map(x=>{if(x.id!==v.id)return x;const ns=x.stock+qty;const avg=((x.cost||0)*x.stock+cost*qty)/ns;return{...x,stock:ns,cost:+avg.toFixed(2)};}));
      setTxs(p=>[...p,{id:genId(),type:'desp',cat:'Compra estoque',desc:`Compra: ${selP.name} ${v.label}`,amount:cost*qty,date:nowISO(),sup:l.sup}]);
    });
    if(!any){alert('Preencha ao menos uma variação.');return;}
    setModal(false);setStep(1);setSelP(null);setLote({});setPS('');
  };

  return(<div>
    <div className="ph"><h1>Compras 📥</h1><p>Entradas de estoque com custo médio automático</p></div>
    <div className="card" style={{marginBottom:10}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Custo Médio Atual</div>
      {prods.map(p=>{const pv=vars.filter(v=>v.pid===p.id);if(!pv.length)return null;return(<div key={p.id} style={{marginBottom:10}}><div style={{fontWeight:600,fontSize:13,color:'var(--ink2)',marginBottom:4}}>{p.name}</div>{pv.map(v=><div key={v.id} className="li" style={{padding:'6px 0'}}><div className="lil"><div className="lit" style={{fontSize:13}}><span className="pill">{v.label}</span> {v.sku}</div><div className="lis">Estoque: {v.stock}</div></div><div className="lir"><div style={{fontWeight:700}}>{fmt(v.cost)}</div><div style={{fontSize:11,color:'var(--ink3)'}}>custo médio</div></div></div>)}</div>);})}
    </div>
    <div className="card">
      <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Histórico de Compras</div>
      {cprs.length===0?<div className="empty"><div className="eico">📥</div><div className="etitle">Nenhuma compra</div></div>
      :[...cprs].reverse().map(c=><div key={c.id} className="li"><div className="lil"><div className="lit">{c.pname} <span className="pill">{c.vlabel}</span></div><div className="lis">{fmtD(c.date)} · {c.qty} un · {fmt(c.cost)}/un{c.sup?` · ${c.sup}`:''}</div></div><div className="lir"><div style={{fontWeight:700,color:'var(--red)'}}>{fmt(c.cost*c.qty)}</div></div></div>)}
    </div>
    <button className="fab" onClick={()=>{setModal(true);setStep(1);setSelP(null);setPS('');}}>＋</button>

    {modal&&<Modal title={step===1?'Selecionar Produto':'Registrar Compra — '+selP?.name} onClose={()=>{setModal(false);setStep(1);}}>
      {step===1&&<>
        <div className="fg"><label className="fl">Buscar produto</label>
          <input autoFocus className="fi" placeholder="Nome ou marca..." value={pSrch} onChange={e=>setPS(e.target.value)}/>
          {pSrch.length>0&&<div className="drop">{fP.length===0
            ?<div className="drow"><span style={{color:'var(--ink3)'}}>Não encontrado — </span><button className="btn bxs bsoft" onClick={()=>setNPM(true)} style={{marginLeft:6}}>+ Cadastrar produto</button></div>
            :fP.map(p=><div key={p.id} className="drow" onClick={()=>openProd(p)}><b>{p.name}{p.brand?` (${p.brand})`:''}</b><span>{p.cat} · {vars.filter(v=>v.pid===p.id).length} variações</span></div>)}</div>}
        </div>
      </>}
      {step===2&&selP&&<>
        <div className="hl" style={{marginBottom:14}}><b>{selP.name}</b>{selP.brand&&` (${selP.brand})`}<br/><span style={{fontSize:12,color:'var(--ink3)'}}>Preencha as variações deste lote</span></div>
        {vars.filter(v=>v.pid===selP.id).map(v=>{const l=lote[v.id]||{qty:'',cost:'',sup:'',date:today()};const showCalc=l.qty>0&&l.cost>0;const ns=v.stock+ +l.qty;const avg=showCalc?((v.cost||0)*v.stock + +l.cost * +l.qty)/ns:0;return(<div key={v.id} style={{borderBottom:'1px solid var(--border)',paddingBottom:12,marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><span className="pill" style={{fontSize:13,padding:'4px 12px'}}>{v.label}</span><span style={{fontSize:11,color:'var(--ink3)'}}>SKU: {v.sku} · Est: {v.stock}</span></div>
          <div className="fr3"><div className="fg"><label className="fl">Qtde</label><input className="fi" type="number" placeholder="0" value={l.qty} onChange={e=>setLote(x=>({...x,[v.id]:{...l,qty:e.target.value}}))}/></div><div className="fg"><label className="fl">Custo unit.</label><input className="fi" type="number" placeholder="R$0,00" value={l.cost} onChange={e=>setLote(x=>({...x,[v.id]:{...l,cost:e.target.value}}))}/></div><div className="fg"><label className="fl">Data</label><input className="fi" type="date" value={l.date} onChange={e=>setLote(x=>({...x,[v.id]:{...l,date:e.target.value}}))}/></div></div>
          <div className="fg"><label className="fl">Fornecedor</label><input className="fi" value={l.sup} onChange={e=>setLote(x=>({...x,[v.id]:{...l,sup:e.target.value}}))}/></div>
          {showCalc&&<div style={{background:'var(--gl)',borderRadius:8,padding:'6px 10px',fontSize:12,color:'#2E7D52'}}>Total: {fmt(+l.qty * +l.cost)} · Novo custo médio: {fmt(avg)}</div>}
        </div>);})}
        <div style={{display:'flex',gap:8}}><button className="btn bghost bsm" onClick={()=>setStep(1)}>← Voltar</button><button className="btn brose bfull" onClick={salvar}>✓ Registrar</button></div>
      </>}
    </Modal>}

    {newPMod&&<Modal title="Novo Produto" onClose={()=>setNPM(false)}>
      <div className="fg"><label className="fl">Nome *</label><input autoFocus className="fi" value={npf.name} onChange={e=>setNPF(x=>({...x,name:e.target.value}))}/></div>
      <div className="fr2"><div className="fg"><label className="fl">Marca</label><input className="fi" value={npf.brand} onChange={e=>setNPF(x=>({...x,brand:e.target.value}))}/></div><div className="fg"><label className="fl">Categoria</label><select className="fs" value={npf.cat} onChange={e=>setNPF(x=>({...x,cat:e.target.value}))}><option value="">Selecionar...</option>{cats.map(c=><option key={c}>{c}</option>)}</select></div></div>
      <button className="btn brose bfull" disabled={!npf.name} onClick={saveNewP}>+ Criar e selecionar</button>
    </Modal>}
  </div>);
}

/* ─── ESTOQUE ──────────────────────────────────────── */
function Estoque({prods,vars,cats}){
  const [srch,setSrch]=useState('');const [cat,setCat]=useState('Todos');
  const filtP=useMemo(()=>prods.filter(p=>(cat==='Todos'||p.cat===cat)&&(p.name?.toLowerCase().includes(srch.toLowerCase())||p.brand?.toLowerCase().includes(srch.toLowerCase()))),[prods,srch,cat]);
  return(<div>
    <div className="ph"><h1>Estoque 📦</h1><p>{vars.reduce((a,v)=>a+v.stock,0)} unidades · {vars.filter(v=>v.stock<=(v.minStock||5)).length} alertas</p></div>
    <div className="swrap" style={{marginBottom:10}}><span className="sico">🔍</span><input className="si" placeholder="Produto ou marca..." value={srch} onChange={e=>setSrch(e.target.value)}/></div>
    <div className="tabs">{['Todos',...cats].map(c=><button key={c} className={`tab ${cat===c?'on':''}`} onClick={()=>setCat(c)}>{c}</button>)}</div>
    {filtP.map(p=>{const pv=vars.filter(v=>v.pid===p.id);const tot=pv.reduce((a,v)=>a+v.stock,0);const hasLow=pv.some(v=>v.stock<=(v.minStock||5));return(<div key={p.id} className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div><div style={{fontWeight:700,fontSize:14}}>{p.name}{p.brand&&<span style={{fontWeight:400,fontSize:12,color:'var(--ink3)'}}> ({p.brand})</span>}</div><div style={{fontSize:12,color:'var(--ink3)',marginTop:1}}>{p.cat}{p.notes?` · ${p.notes}`:''}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontWeight:700,fontSize:16}}>{tot}</div><div style={{fontSize:10,color:'var(--ink3)'}}>total</div>{hasLow&&<span className="badge br" style={{marginTop:2}}>Baixo</span>}</div>
      </div>
      {pv.map(v=>{const low=v.stock<=(v.minStock||5);const pct=Math.min(100,(v.stock/Math.max((v.minStock||5)*3,1))*100);return(<div key={v.id} style={{paddingTop:7,borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><span className="pill">{v.label}</span><span style={{fontSize:11,color:'var(--ink3)',marginLeft:6}}>SKU: {v.sku}</span></div>
          <div><span style={{fontWeight:700,color:low?'var(--red)':'var(--ink)'}}>{v.stock} un</span><span style={{fontSize:11,color:'var(--rose)',marginLeft:8}}>{fmt(v.price)}</span></div>
        </div>
        <div className="sbwrap"><div className="sbfill" style={{width:`${pct}%`,background:low?'var(--red)':'var(--green)'}}/></div>
        <div style={{fontSize:10,color:'var(--ink3)',marginTop:2}}>Mín: {v.minStock||5} · Custo médio: {fmt(v.cost)}</div>
      </div>);})}
    </div>);})}
    {filtP.length===0&&<div className="empty"><div className="eico">📦</div><div className="etitle">Nenhum produto</div></div>}
  </div>);
}

/* ─── CLIENTES ─────────────────────────────────────── */
function Clientes({clis,setClis,vendas}){
  const [modal,setModal]=useState(false);const [edit,setEdit]=useState(null);const [srch,setSrch]=useState('');const [tab,setTab]=useState('all');const [det,setDet]=useState(null);
  const [f,setF]=useState({name:'',phone:'',cpf:'',email:'',birthday:'',notes:''});
  const openEdit=c=>{setEdit(c);setF({name:c.name,phone:c.phone||'',cpf:c.cpf||'',email:c.email||'',birthday:c.birthday||'',notes:c.notes||''});setModal(true);};
  const save=()=>{if(!f.name)return;if(edit)setClis(p=>p.map(c=>c.id===edit.id?{...c,...f}:c));else setClis(p=>[...p,{id:genId(),...f,debt:0}]);setModal(false);setEdit(null);setF({name:'',phone:'',cpf:'',email:'',birthday:'',notes:''});};
  const del=id=>{if(confirm('Remover?'))setClis(p=>p.filter(c=>c.id!==id));};
  const tdMD=today().slice(5),tdM=today().slice(5,7);
  const filtC=useMemo(()=>{let l=[...clis];if(tab==='fiado')l=l.filter(c=>c.debt>0);if(tab==='bd')l=l.filter(c=>c.birthday?.slice(5,7)===tdM);if(srch)l=l.filter(c=>c.name?.toLowerCase().includes(srch.toLowerCase())||(c.cpf&&c.cpf.includes(srch)));return l;},[clis,tab,srch,tdM]);
  const cV=id=>vendas.filter(v=>v.cid===id);
  const cT=id=>cV(id).filter(v=>v.status==='paid').reduce((a,v)=>a+v.total,0);
  return(<div>
    <div className="ph"><h1>Clientes 👥</h1><p>{clis.length} cadastrados · {clis.filter(c=>c.debt>0).length} com fiado</p></div>
    <div className="tabs">{[['all','Todos'],['fiado','Fiado'],['bd','🎂 Aniversário']].map(([k,l])=><button key={k} className={`tab ${tab===k?'on':''}`} onClick={()=>setTab(k)}>{l}</button>)}</div>

/* ─── FINANCEIRO ───────────────────────────────────── */
function Financeiro({txs,setTxs,contas,setContas,vendas,clis}){
  const [sub,setSub]=useState(null);
  const mn=month0();const mTx=txs.filter(t=>t.date?.startsWith(mn));
  const rec=mTx.filter(t=>t.type==='rec').reduce((a,t)=>a+t.amount,0);
  const desp=mTx.filter(t=>t.type==='desp').reduce((a,t)=>a+t.amount,0);
  const od=contas.filter(c=>!c.paid&&c.dueDate<today());
  const pend=contas.filter(c=>!c.paid);
  if(sub==='desp') return <FinDesp txs={txs} setTxs={setTxs} contas={contas} setContas={setContas} onBack={()=>setSub(null)}/>;
  if(sub==='forn') return <FinForn onBack={()=>setSub(null)}/>;
  if(sub==='rel')  return <FinRel  txs={txs} vendas={vendas} clis={clis} contas={contas} onBack={()=>setSub(null)}/>;
  return(<div>
    <div className="ph"><h1>Financeiro 📊</h1></div>
    <div className="sumbar">
      <div style={{fontSize:11,opacity:.5,marginBottom:3}}>Resultado do mês</div>
      <div style={{fontSize:26,fontWeight:800,color:rec-desp>=0?'#4CAF7D':'#E05C6A'}}>{fmt(rec-desp)}</div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:12}}>
        <div><div style={{fontSize:10,opacity:.45,textAlign:'center'}}>↑ Receitas</div><div style={{fontSize:13,fontWeight:700,textAlign:'center'}}>{fmt(rec)}</div></div>
        <div><div style={{fontSize:10,opacity:.45,textAlign:'center'}}>↓ Despesas</div><div style={{fontSize:13,fontWeight:700,textAlign:'center'}}>{fmt(desp)}</div></div>
        <div><div style={{fontSize:10,opacity:.45,textAlign:'center'}}>A pagar</div><div style={{fontSize:13,fontWeight:700,textAlign:'center',color:od.length>0?'#E05C6A':'#fff'}}>{fmt(pend.reduce((a,c)=>a+c.amount,0))}</div></div>
      </div>
    </div>
    <div className="scap">Módulos</div>
    {[{id:'desp',ico:'💸',t:'Despesas & Contas a Pagar',s:'Lançar e efetivar'},{id:'forn',ico:'🏭',t:'Fornecedores',s:'Cadastro de fornecedores'},{id:'rel',ico:'📊',t:'Relatórios',s:'Balanços com filtros'}].map(m=>(
      <div key={m.id} className="smitem" onClick={()=>setSub(m.id)}><span className="smico">{m.ico}</span><div className="smtxt"><div className="smtitle">{m.t}</div><div className="smsub">{m.s}</div></div><span style={{color:'var(--ink3)'}}>›</span></div>
    ))}
    <div className="scap">Resumo</div>
    <div className="card">{[...txs].reverse().slice(0,10).map(t=><div key={t.id} className="li"><div className="lil"><div className="lit">{t.desc}</div><div className="lis">{fmtD(t.date)} · {t.cat}</div></div><div style={{fontWeight:700,color:t.type==='rec'?'var(--green)':'var(--red)',flexShrink:0,marginLeft:8}}>{t.type==='rec'?'+':'−'}{fmt(t.amount)}</div></div>)}</div>
  </div>);
}

    {tab==='desp'&&<><div className="card">{txs.filter(t=>t.type==='desp').reverse().map(t=><div key={t.id} className="li"><div className="lil"><div className="lit">{t.desc}</div><div className="lis">{fmtD(t.date)} · {t.cat}{t.sup?` · ${t.sup}`:''}</div></div><div style={{fontWeight:700,color:'var(--red)',flexShrink:0,marginLeft:8}}>{fmt(t.amount)}</div></div>)}</div><button className="fab" onClick={()=>setModal(true)}>＋</button></>}

      <div className="card">{contas.length===0?<div className="empty"><div className="eico">🧾</div><div className="etitle">Sem contas</div></div>:contas.map(c=>{const days=(new Date(c.dueDate)-new Date())/864e5;return(<div key={c.id} className="li"><div className="lil"><div className="lit">{c.desc}</div><div className="lis">{c.cat}{c.sup?` · ${c.sup}`:''} · Vence: {fmtD(c.dueDate)}</div>{!c.paid&&c.dueDate<today()&&<span className="badge br" style={{marginTop:3}}>Vencida</span>}{!c.paid&&days>=0&&days<=5&&<span className="badge bgo" style={{marginTop:3}}>Vence em breve</span>}{c.paid&&<span className="badge bg" style={{marginTop:3}}>Efetivada</span>}</div><div className="lir"><div style={{fontWeight:700,color:'var(--red)'}}>{fmt(c.amount)}</div>{!c.paid&&<button className="btn bgreen bxs" style={{marginTop:4}} onClick={()=>efetivar(c.id)}>✓ Efetivar</button>}</div></div>);})}</div>

      <div className="fr2"><div className="fg"><label className="fl">Categoria</label><select className="fs" value={f.cat} onChange={e=>setF(x=>({...x,cat:e.target.value}))}><option value="">Selecionar...</option>{CATS.map(c=><option key={c}>{c}</option>)}</select></div><div className="fg"><label className="fl">Fornecedor</label><input className="fi" value={f.sup} onChange={e=>setF(x=>({...x,sup:e.target.value}))}/></div></div>
      <button className="btn brose bfull" onClick={saveD}>+ Registrar</button>
    </Modal>}
    {pm&&<Modal title="Nova Conta a Pagar" onClose={()=>setPM(false)}>
      <div className="fg"><label className="fl">Descrição</label><input autoFocus className="fi" value={pf.desc} onChange={e=>setPF(x=>({...x,desc:e.target.value}))}/></div>
      <div className="fr2"><div className="fg"><label className="fl">Valor (R$)</label><input className="fi" type="number" value={pf.amount} onChange={e=>setPF(x=>({...x,amount:e.target.value}))}/></div><div className="fg"><label className="fl">Vencimento</label><input className="fi" type="date" value={pf.due} onChange={e=>setPF(x=>({...x,due:e.target.value}))}/></div></div>
      <div className="fr2"><div className="fg"><label className="fl">Categoria</label><select className="fs" value={pf.cat} onChange={e=>setPF(x=>({...x,cat:e.target.value}))}>{['Fornecedor','Aluguel','Fixo','Salário','Marketing','Outros'].map(c=><option key={c}>{c}</option>)}</select></div><div className="fg"><label className="fl">Fornecedor</label><input className="fi" value={pf.sup} onChange={e=>setPF(x=>({...x,sup:e.target.value}))}/></div></div>
      <button className="btn brose bfull" onClick={saveP}>+ Adicionar</button>
