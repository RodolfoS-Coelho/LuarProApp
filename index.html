/* ─── RELATÓRIOS ───────────────────────────────────── */
function FinRel({txs,vendas,clis,contas,onBack}){
  const [active,setActive]=useState(null);
  const RELS=[{id:'vendas',ico:'🛒',t:'Vendas',s:'Data, pagamento, cliente, status'},{id:'fiado',ico:'📋',t:'Fiado / A Receber',s:'Por cliente'},{id:'rec',ico:'↑',t:'Receitas',s:'Entradas por período'},{id:'desp',ico:'↓',t:'Despesas',s:'Saídas por tipo/fornecedor'},{id:'contas',ico:'🧾',t:'Contas a Pagar',s:'Pendentes e efetivadas'}];
  if(active) return <RelDetalhe type={active} txs={txs} vendas={vendas} clis={clis} contas={contas} onBack={()=>setActive(null)}/>;
  return(<div><button className="btn bghost bsm" style={{marginBottom:14}} onClick={onBack}>← Voltar</button><div className="ph"><h1>Relatórios 📊</h1><p>Somente leitura — use Despesas para lançar</p></div>{RELS.map(r=><div key={r.id} className="smitem" onClick={()=>setActive(r.id)}><span className="smico">{r.ico}</span><div className="smtxt"><div className="smtitle">{r.t}</div><div className="smsub">{r.s}</div></div><span style={{color:'var(--ink3)'}}>›</span></div>)}</div>);
}

function RelDetalhe({type,txs,vendas,clis,contas,onBack}){
  const [df,setDF]=useState(month0()+'-01');const [dt,setDT]=useState(today());
  const [pf,setPF]=useState('todos');const [cf,setCF]=useState('');const [catf,setCAF]=useState('');const [supf,setSUF]=useState('');const [stf,setSTF]=useState('todos');const [vf,setVF]=useState('');
  const TIT={vendas:'Vendas',fiado:'Fiado',rec:'Receitas',desp:'Despesas',contas:'Contas a Pagar'};
  const inR=d=>d>=df&&d<=(dt+'T23:59:59');
  const res=useMemo(()=>{
    if(type==='vendas'){let l=vendas.filter(v=>inR(v.date));if(pf!=='todos')l=l.filter(v=>v.pay===pf);if(cf)l=l.filter(v=>v.cname?.toLowerCase().includes(cf.toLowerCase()));if(stf!=='todos')l=l.filter(v=>v.status===stf);if(vf)l=l.filter(v=>v.total>= +vf);return l;}
    if(type==='fiado'){let l=vendas.filter(v=>v.pay==='fiado');if(cf)l=l.filter(v=>v.cname?.toLowerCase().includes(cf.toLowerCase()));if(stf!=='todos')l=l.filter(v=>v.status===stf);return l;}
    if(type==='rec'){let l=txs.filter(t=>t.type==='rec'&&inR(t.date));if(catf)l=l.filter(t=>t.cat===catf);return l;}
    if(type==='desp'){let l=txs.filter(t=>t.type==='desp'&&inR(t.date));if(catf)l=l.filter(t=>t.cat===catf);if(supf)l=l.filter(t=>t.sup?.toLowerCase().includes(supf.toLowerCase()));return l;}
    if(type==='contas'){let l=[...contas];if(stf==='pend')l=l.filter(c=>!c.paid);if(stf==='efet')l=l.filter(c=>c.paid);if(supf)l=l.filter(c=>c.sup?.toLowerCase().includes(supf.toLowerCase()));return l;}
    return[];
  },[type,vendas,txs,contas,df,dt,pf,cf,catf,supf,stf,vf]);
  const tot=res.reduce((a,r)=>a+(r.total||r.amount||0),0);

  const doPrint=()=>{
    const rows=res.map(r=>`<tr><td>${r.cname||r.desc||''}</td><td>${fmtD(r.date||r.dueDate)}</td><td>${r.pay||r.cat||''}</td><td>${r.sup||''}</td><td align="right"><b>${fmt(r.total||r.amount)}</b></td><td>${r.status==='paid'||r.paid?'✓':'Pendente'}</td></tr>`).join('');
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>${TIT[type]}</title><style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px;font-size:11px}th{background:#f5f5f5}tfoot td{font-weight:700;background:#fef0f3}h2,p{margin-bottom:8px}</style></head><body><h2>${TIT[type]}</h2><p>${df} até ${dt} · ${res.length} registros · Total: ${fmt(tot)}</p><table><thead><tr><th>Descrição</th><th>Data</th><th>Pag./Cat.</th><th>Fornecedor</th><th>Valor</th><th>Status</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="4">TOTAL</td><td align="right">${fmt(tot)}</td><td></td></tr></tfoot></table><script>window.onload=()=>window.print()<\/script></body></html>`);
    w.document.close();
  };

  return(<div>
    <button className="btn bghost bsm" style={{marginBottom:14}} onClick={onBack}>← Voltar</button>
    <div className="ph"><h1>{TIT[type]}</h1><p>Somente leitura</p></div>
    <div className="card" style={{marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>🔍 Filtros</div>
      {(type==='vendas'||type==='rec'||type==='desp')&&<div className="fr2"><div className="fg"><label className="fl">De</label><input className="fi" type="date" value={df} onChange={e=>setDF(e.target.value)}/></div><div className="fg"><label className="fl">Até</label><input className="fi" type="date" value={dt} onChange={e=>setDT(e.target.value)}/></div></div>}
      {(type==='vendas'||type==='fiado')&&<><div className="fr2"><div className="fg"><label className="fl">Cliente</label><input className="fi" placeholder="Nome..." value={cf} onChange={e=>setCF(e.target.value)}/></div><div className="fg"><label className="fl">Pagamento</label><select className="fs" value={pf} onChange={e=>setPF(e.target.value)}><option value="todos">Todos</option>{['pix','dinheiro','debito','credito','fiado'].map(m=><option key={m} value={m}>{m.toUpperCase()}</option>)}</select></div></div><div className="fr2"><div className="fg"><label className="fl">Status</label><select className="fs" value={stf} onChange={e=>setSTF(e.target.value)}><option value="todos">Todos</option><option value="paid">Pagos</option><option value="pending">Pendentes</option></select></div><div className="fg"><label className="fl">Valor mínimo (R$)</label><input className="fi" type="number" placeholder="0" value={vf} onChange={e=>setVF(e.target.value)}/></div></div></>}
      {type==='rec'&&<div className="fg"><label className="fl">Categoria</label><select className="fs" value={catf} onChange={e=>setCAF(e.target.value)}><option value="">Todas</option>{['Venda','Fiado recebido','Serviço','Outros'].map(c=><option key={c}>{c}</option>)}</select></div>}
      {type==='desp'&&<div className="fr2"><div className="fg"><label className="fl">Categoria</label><select className="fs" value={catf} onChange={e=>setCAF(e.target.value)}><option value="">Todas</option>{['Compra estoque','Aluguel','Fornecedor','Salário','Marketing','Frete','Taxa cartão','Outros'].map(c=><option key={c}>{c}</option>)}</select></div><div className="fg"><label className="fl">Fornecedor</label><input className="fi" value={supf} onChange={e=>setSUF(e.target.value)}/></div></div>}
      {type==='contas'&&<div className="fr2"><div className="fg"><label className="fl">Status</label><select className="fs" value={stf} onChange={e=>setSTF(e.target.value)}><option value="todos">Todos</option><option value="pend">Pendentes</option><option value="efet">Efetivadas</option></select></div><div className="fg"><label className="fl">Fornecedor</label><input className="fi" value={supf} onChange={e=>setSUF(e.target.value)}/></div></div>}
    </div>
    <div style={{background:'var(--rose-xl)',borderRadius:11,padding:'10px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontSize:13,fontWeight:600}}>{res.length} registros</span>
      <span style={{fontWeight:800,color:'var(--rose)',fontSize:15}}>{fmt(tot)}</span>
    </div>
    <div className="card">{res.length===0?<div className="empty" style={{padding:'16px 0'}}><div style={{fontSize:13}}>Nenhum resultado</div></div>
    :res.map((r,i)=><div key={i} className="li"><div className="lil"><div className="lit">{r.cname||r.desc}</div><div className="lis">{fmtD(r.date||r.dueDate)}{r.cat?` · ${r.cat}`:''}{r.sup?` · ${r.sup}`:''}</div>{r.status!==undefined&&<span className={`badge ${r.status==='paid'?'bg':'bgo'}`} style={{marginTop:2}}>{r.status==='paid'?'Pago':'Pendente'}</span>}{r.paid!==undefined&&<span className={`badge ${r.paid?'bg':'br'}`} style={{marginTop:2}}>{r.paid?'Efetivada':'A pagar'}</span>}</div><div style={{fontWeight:700,flexShrink:0,marginLeft:10}}>{fmt(r.total||r.amount)}</div></div>)}</div>
    <div style={{display:'flex',gap:8,marginTop:12}}>
      <button className="btn bghost bsm" onClick={doPrint}>🖨️ Imprimir</button>
      <button className="btn bghost bsm" onClick={doPrint}>📄 PDF</button>
    </div>
  </div>);
}

/* ─── AJUSTES ──────────────────────────────────────── */
function Ajustes({cfg,setCfg,prods,setProds,vars,setVars,cats,setCats,user,onLogout}){
  const [sub,setSub]=useState(null);
  if(sub==='loja')   return <AjLoja   cfg={cfg} setCfg={setCfg} onBack={()=>setSub(null)}/>;
  if(sub==='fin')    return <AjFin    cfg={cfg} setCfg={setCfg} onBack={()=>setSub(null)}/>;
  if(sub==='stock')  return <AjStock  prods={prods} setProds={setProds} vars={vars} setVars={setVars} cats={cats} setCats={setCats} onBack={()=>setSub(null)}/>;
  if(sub==='users')  return <AjUsers  user={user} onBack={()=>setSub(null)}/>;
  return(<div>
    <div className="ph"><h1>Ajustes ⚙️</h1><p>{user.name}</p></div>
    <div className="scap">Loja</div>
    <div className="smitem" onClick={()=>setSub('loja')}><span className="smico">🏪</span><div className="smtxt"><div className="smtitle">Cadastro da Loja</div><div className="smsub">Logo, nome, CNPJ, endereço</div></div><span style={{color:'var(--ink3)'}}>›</span></div>
    <div className="scap">Cadastros</div>
    {[{id:'fin',ico:'💳',t:'Cadastro Financeiro',s:'Pagamentos e taxas por parcela'},{id:'stock',ico:'📦',t:'Cadastro de Estoque',s:'Produtos, variações e categorias'},{id:'users',ico:'👥',t:'Cadastro de Usuários',s:'Funcionários, logins e senhas'}].map(m=>(
      <div key={m.id} className="smitem" onClick={()=>setSub(m.id)}><span className="smico">{m.ico}</span><div className="smtxt"><div className="smtitle">{m.t}</div><div className="smsub">{m.s}</div></div><span style={{color:'var(--ink3)'}}>›</span></div>
    ))}
    <div className="divider"/>
    <button className="btn bghost bfull" style={{color:'var(--red)'}} onClick={onLogout}>Sair da conta</button>
  </div>);
}

function AjLoja({cfg,setCfg,onBack}){
  const [f,setF]=useState({...cfg});const [ok,setOk]=useState(false);
  const save=()=>{setCfg(f);setOk(true);setTimeout(()=>setOk(false),2000);};
  const upload=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>setF(x=>({...x,logo:ev.target.result}));r.readAsDataURL(file);};
  const Fld=({l,k,type='text',ph=''})=><div className="fg"><label className="fl">{l}</label><input className="fi" type={type} placeholder={ph} value={f[k]||''} onChange={e=>setF(x=>({...x,[k]:type==='number'?+e.target.value:e.target.value}))}/></div>;
  return(<div><button className="btn bghost bsm" style={{marginBottom:14}} onClick={onBack}>← Voltar</button><div className="ph"><h1>Cadastro da Loja</h1></div>
    <div className="card" style={{marginBottom:10}}>
      <div style={{fontWeight:700,marginBottom:10}}>🖼️ Logotipo</div>
      {f.logo?<div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}><img src={f.logo} style={{height:44,objectFit:'contain',borderRadius:6,border:'1px solid var(--border)'}}/><button className="btn bghost bsm" onClick={()=>setF(x=>({...x,logo:''}))}>Remover</button></div>:<div className="upbox" onClick={()=>document.getElementById('logoUp').click()}><div style={{fontSize:30,marginBottom:6}}>🖼️</div><div style={{fontSize:13,color:'var(--ink3)'}}>Clique para enviar logo</div></div>}
      <input id="logoUp" type="file" accept="image/*" style={{display:'none'}} onChange={upload}/>
    </div>
    <div className="card"><Fld l="Nome da loja" k="storeName"/><Fld l="Razão Social" k="razaoSocial"/><div className="fr2"><Fld l="CNPJ/CPF" k="cnpj"/><Fld l="CEP" k="cep"/></div><Fld l="Endereço" k="endereco"/><div className="fr2"><Fld l="Cidade" k="cidade"/><Fld l="UF" k="uf"/></div></div>
    {ok&&<div style={{background:'var(--gl)',color:'#2E7D52',borderRadius:9,padding:'10px 13px',marginTop:10,fontSize:13}}>✓ Salvo!</div>}
    <button className="btn brose bfull" style={{marginTop:12}} onClick={save}>✓ Salvar</button>
  </div>);
}

function AjFin({cfg,setCfg,onBack}){
  const [f,setF]=useState({...cfg});const [ok,setOk]=useState(false);
  const save=()=>{setCfg(f);setOk(true);setTimeout(()=>setOk(false),2000);};
  const togPay=m=>setF(x=>{const c=x.payMethods||[];return{...x,payMethods:c.includes(m)?c.filter(v=>v!==m):[...c,m]};});
  const updTier=(i,t)=>setF(x=>{const arr=[...(x.tiers||[])];arr[i]={...arr[i],t:+t};return{...x,tiers:arr};});
  const addTier=()=>setF(x=>{const arr=[...(x.tiers||[])];return{...x,tiers:[...arr,{p:arr.length+1,t:0}]};});
  const remTier=i=>setF(x=>({...x,tiers:(x.tiers||[]).filter((_,j)=>j!==i)}));
  return(<div><button className="btn bghost bsm" style={{marginBottom:14}} onClick={onBack}>← Voltar</button><div className="ph"><h1>Cadastro Financeiro</h1></div>
    <div className="card" style={{marginBottom:10}}><div style={{fontWeight:700,marginBottom:10}}>💳 Formas de pagamento</div><div className="chips">{['pix','dinheiro','debito','credito','fiado'].map(m=><button key={m} className={`chip ${(f.payMethods||[]).includes(m)?'on':''}`} onClick={()=>togPay(m)}>{m.toUpperCase()}</button>)}</div></div>
    <div className="card" style={{marginBottom:10}}><div style={{fontWeight:700,marginBottom:10}}>📊 Taxas Base</div><div className="fr2"><div className="fg"><label className="fl">PIX (%)</label><input className="fi" type="number" step="0.1" value={f.taxPix||0} onChange={e=>setF(x=>({...x,taxPix:+e.target.value}))}/></div><div className="fg"><label className="fl">Débito (%)</label><input className="fi" type="number" step="0.1" value={f.taxDebito||0} onChange={e=>setF(x=>({...x,taxDebito:+e.target.value}))}/></div></div></div>
    <div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><div><div style={{fontWeight:700}}>💳 Crédito por Parcela</div><div style={{fontSize:12,color:'var(--ink3)'}}>Taxa específica por número de parcelas</div></div><button className="btn bsoft bsm" onClick={addTier}>+ Parcela</button></div>
      {(f.tiers||[]).map((t,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}><div style={{flex:1}}><label className="fl">{t.p}x parcela</label><div style={{display:'flex',gap:6,alignItems:'center'}}><input className="fi" type="number" step="0.1" value={t.t} onChange={e=>updTier(i,e.target.value)} style={{flex:1}}/><span style={{fontSize:12,color:'var(--ink3)'}}>%</span></div></div><button className="btn bxs bghost" style={{marginTop:16}} onClick={()=>remTier(i)}>✕</button></div>)}
    </div>
    {ok&&<div style={{background:'var(--gl)',color:'#2E7D52',borderRadius:9,padding:'10px 13px',marginBottom:10,fontSize:13}}>✓ Salvo!</div>}
    <button className="btn brose bfull" onClick={save}>✓ Salvar</button>
  </div>);
}

function AjStock({prods,setProds,vars,setVars,cats,setCats,onBack}){
  const [sub,setSub]=useState(null);const [selP,setSelP]=useState(null);
  const [newCat,setNC]=useState('');
  const [pf,setPF]=useState({name:'',brand:'',cat:'',notes:''});
  const bv={label:'',sku:'',cost:'',price:'',stock:0,minStock:5};const [vf,setVF]=useState({...bv});const [editV,setEV]=useState(null);const [vm,setVM]=useState(false);

  const saveProd=()=>{if(!pf.name)return;if(selP)setProds(p=>p.map(x=>x.id===selP.id?{...x,...pf}:x));else setProds(p=>[...p,{id:genId(),...pf}]);setSub(null);setPF({name:'',brand:'',cat:'',notes:''});setSelP(null);};
  const delProd=id=>{if(!confirm('Remover produto e variações?'))return;setProds(p=>p.filter(x=>x.id!==id));setVars(v=>v.filter(x=>x.pid!==id));};
  const saveVar=()=>{if(!vf.label)return;const sku=vf.sku||genSKU(selP.name+' '+vf.label);if(editV)setVars(p=>p.map(x=>x.id===editV.id?{...x,...vf,cost:+vf.cost,price:+vf.price,stock:+vf.stock,minStock:+vf.minStock,sku}:x));else setVars(p=>[...p,{id:genId(),pid:selP.id,...vf,cost:+vf.cost,price:+vf.price,stock:+vf.stock,minStock:+vf.minStock,sku}]);setVM(false);setVF({...bv});setEV(null);};
  const delVar=id=>{if(confirm('Remover variação?'))setVars(p=>p.filter(x=>x.id!==id));};

  if(sub==='cats') return(<div><button className="btn bghost bsm" style={{marginBottom:14}} onClick={()=>setSub(null)}>← Voltar</button><div className="ph"><h1>Categorias</h1></div><div className="card"><div style={{display:'flex',gap:8,marginBottom:12}}><input className="fi" placeholder="Nova categoria..." value={newCat} onChange={e=>setNC(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(cats.includes(newCat.trim())||!newCat.trim()?null:(setCats(p=>[...p,newCat.trim()]),setNC('')))}/><button className="btn brose bsm" onClick={()=>{if(!newCat.trim()||cats.includes(newCat.trim()))return;setCats(p=>[...p,newCat.trim()]);setNC('');}}>+</button></div>{cats.map(c=><div key={c} className="li"><span style={{fontWeight:500}}>{c}</span><button className="btn bxs bghost" onClick={()=>{if(confirm(`Remover "${c}"?`))setCats(p=>p.filter(x=>x!==c));}}>🗑️</button></div>)}</div></div>);

  if(sub==='prod') return(<div><button className="btn bghost bsm" style={{marginBottom:14}} onClick={()=>{setSub(null);setPF({name:'',brand:'',cat:'',notes:''});setSelP(null);}}>← Voltar</button><div className="ph"><h1>{selP?'Editar Produto':'Novo Produto'}</h1><p>Dados gerais. Variações (tamanhos) são cadastradas separadamente.</p></div>
    <div className="card">
      <div className="fg"><label className="fl">Nome do produto *</label><input autoFocus className="fi" placeholder="Ex: Cílios Maria Sasha 4D W — Curvatura M" value={pf.name} onChange={e=>setPF(x=>({...x,name:e.target.value}))}/></div>
      <div className="fr2"><div className="fg"><label className="fl">Marca</label><input className="fi" value={pf.brand} onChange={e=>setPF(x=>({...x,brand:e.target.value}))}/></div><div className="fg"><label className="fl">Categoria</label><select className="fs" value={pf.cat} onChange={e=>setPF(x=>({...x,cat:e.target.value}))}><option value="">Selecionar...</option>{cats.map(c=><option key={c}>{c}</option>)}</select></div></div>
      <div className="fg"><label className="fl">Característica / Notas</label><input className="fi" placeholder="Ex: Curvatura M | Cor Preta" value={pf.notes} onChange={e=>setPF(x=>({...x,notes:e.target.value}))}/></div>
    </div>
    <button className="btn brose bfull" style={{marginTop:12}} disabled={!pf.name} onClick={saveProd}>{selP?'✓ Salvar':'+ Criar Produto'}</button>
  </div>);

  // Lista produtos
  return(<div>
    <button className="btn bghost bsm" style={{marginBottom:14}} onClick={onBack}>← Voltar</button>
    <div className="ph"><h1>Cadastro de Estoque</h1></div>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      <button className="btn brose bsm" style={{flex:1}} onClick={()=>{setPF({name:'',brand:'',cat:'',notes:''});setSelP(null);setSub('prod');}}>+ Novo Produto</button>
      <button className="btn bghost bsm" onClick={()=>setSub('cats')}>🏷️ Categorias</button>
    </div>
    {prods.map(p=>{const pv=vars.filter(v=>v.pid===p.id);return(<div key={p.id} className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14}}>{p.name}</div><div style={{fontSize:12,color:'var(--ink3)',marginTop:1}}>{p.cat}{p.brand?` · ${p.brand}`:''}{p.notes?` · ${p.notes}`:''}</div></div>
        <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8}}>
          <button className="btn bsoft bxs" onClick={()=>{setSelP(p);setPF({name:p.name,brand:p.brand||'',cat:p.cat||'',notes:p.notes||''});setSub('prod');}}>✏️</button>
          <button className="btn bghost bxs" onClick={()=>delProd(p.id)}>🗑️</button>
        </div>
      </div>
      <div style={{borderTop:'1px solid var(--border)',paddingTop:8}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:7}}>Variações ({pv.length})</div>
        {pv.map(v=><div key={v.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:6,marginBottom:6,borderBottom:'1px dashed var(--border)'}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}><span className="pill" style={{fontSize:12,padding:'3px 10px'}}>{v.label}</span><span style={{fontSize:11,color:'var(--ink3)'}}>SKU: {v.sku}</span>{v.stock<=(v.minStock||5)&&<span className="badge br">Baixo</span>}</div>
            <div style={{fontSize:12,color:'var(--ink3)',marginTop:2}}>Est: <b style={{color:'var(--ink)'}}>{v.stock}</b> · Custo: {fmt(v.cost)} · Preço: <b style={{color:'var(--rose)'}}>{fmt(v.price)}</b></div>
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0,marginLeft:8}}>
            <button className="btn bsoft bxs" onClick={()=>{setSelP(p);setEV(v);setVF({label:v.label,sku:v.sku||'',cost:v.cost,price:v.price,stock:v.stock,minStock:v.minStock||5});setVM(true);}}>✏️</button>
            <button className="btn bghost bxs" onClick={()=>delVar(v.id)}>🗑️</button>
          </div>
        </div>)}
        <button className="btn bghost bsm bfull" style={{marginTop:4}} onClick={()=>{setSelP(p);setEV(null);setVF({...bv});setVM(true);}}>+ Adicionar Variação</button>
      </div>
    </div>);})}
    {prods.length===0&&<div className="empty"><div className="eico">📦</div><div className="etitle">Nenhum produto</div><div style={{fontSize:13,color:'var(--ink3)'}}>Clique em "+ Novo Produto" para começar</div></div>}

    {vm&&selP&&<Modal title={editV?`Editar: ${selP.name}`:`Nova Variação: ${selP.name}`} onClose={()=>{setVM(false);setVF({...bv});setEV(null);}}>
      <div className="hl">{selP.name}{selP.notes?` · ${selP.notes}`:''}</div>
      <div className="fg"><label className="fl">Label / Tamanho *</label><input autoFocus className="fi" placeholder="Ex: 7mm / Rosa / Kit Completo" value={vf.label} onChange={e=>setVF(x=>({...x,label:e.target.value}))}/></div>
      <div className="fg"><label className="fl">SKU / Código de Barras (auto se vazio)</label><input className="fi" placeholder="Gerado automaticamente" value={vf.sku} onChange={e=>setVF(x=>({...x,sku:e.target.value}))}/></div>
      <div className="fr2">
        <div className="fg"><label className="fl">Custo (R$)</label><input className="fi" type="number" step="0.01" value={vf.cost} onChange={e=>setVF(x=>({...x,cost:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Preço venda (R$)</label><div style={{position:'relative'}}>
          <input className="fi" type="number" step="0.01" value={vf.price} onChange={e=>setVF(x=>({...x,price:e.target.value}))} style={{paddingRight:vf.cost>0?88:14}}/>
          {vf.cost>0&&<button onClick={()=>setVF(x=>({...x,price:(+vf.cost*1.6).toFixed(2)}))} style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'var(--rose-l)',border:'none',borderRadius:6,padding:'3px 6px',fontSize:10,color:'var(--rose-d)',cursor:'pointer',whiteSpace:'nowrap'}}>60% marg.</button>}
        </div></div>
      </div>
      {vf.cost>0&&vf.price>0&&<div style={{background:'var(--gl)',borderRadius:8,padding:'7px 11px',marginBottom:10,fontSize:12,color:'#2E7D52'}}>Margem: {(((+vf.price-+vf.cost)/+vf.cost)*100).toFixed(1)}% · Lucro: {fmt(+vf.price-+vf.cost)}/un</div>}
      <div className="fr2"><div className="fg"><label className="fl">Estoque inicial</label><input className="fi" type="number" value={vf.stock} onChange={e=>setVF(x=>({...x,stock:e.target.value}))}/></div><div className="fg"><label className="fl">Estoque mínimo</label><input className="fi" type="number" value={vf.minStock} onChange={e=>setVF(x=>({...x,minStock:e.target.value}))}/></div></div>
      <button className="btn brose bfull" disabled={!vf.label} onClick={saveVar}>{editV?'✓ Salvar':'+ Adicionar Variação'}</button>
    </Modal>}
  </div>);
}

function AjUsers({user,onBack}){
  const [us,setUs]=useState(loadU());
  const [f,setF]=useState({name:'',email:'',password:'',role:'func'});
  const [pf,setPF]=useState({cur:'',n:'',c:''});const [pe,setPE]=useState('');const [po,setPO]=useState(false);
  const add=()=>{if(!f.name||!f.email||f.password.length<6)return;const u={id:genId(),name:f.name,initials:f.name.slice(0,2).toUpperCase(),email:f.email,password:f.password,role:f.role};const upd=[...us,u];saveU(upd);setUs(upd);setF({name:'',email:'',password:'',role:'func'});};
  const del=id=>{if(id===user.id){alert('Não pode remover você mesmo');return;}if(confirm('Remover?')){const upd=us.filter(u=>u.id!==id);saveU(upd);setUs(upd);}};
  const chg=()=>{const u=us.find(x=>x.id===user.id);if(!u||pf.cur!==u.password){setPE('Senha atual incorreta');return;}if(pf.n!==pf.c){setPE('Senhas não coincidem');return;}if(pf.n.length<6){setPE('Mínimo 6 caracteres');return;}u.password=pf.n;const upd=[...us];saveU(upd);setUs(upd);setPE('');setPO(true);setPF({cur:'',n:'',c:''});setTimeout(()=>setPO(false),2000);};
  return(<div><button className="btn bghost bsm" style={{marginBottom:14}} onClick={onBack}>← Voltar</button><div className="ph"><h1>Cadastro de Usuários</h1></div>
    <div className="card" style={{marginBottom:10}}>
      <div style={{fontWeight:700,marginBottom:10}}>👥 Usuários</div>
      {us.map(u=><div key={u.id} className="li"><div style={{display:'flex',alignItems:'center',gap:10}}><Avatar name={u.name} size={34}/><div><div style={{fontWeight:600,fontSize:13}}>{u.name} {u.role==='admin'&&<span className="badge brs">Admin</span>}</div><div style={{fontSize:12,color:'var(--ink3)'}}>{u.email}</div></div></div><div>{user.id!==u.id?<button className="btn bxs bghost" onClick={()=>del(u.id)}>🗑️</button>:<span className="badge bgy">Você</span>}</div></div>)}
    </div>
    <div className="card" style={{marginBottom:10}}>
      <div style={{fontWeight:700,marginBottom:10}}>➕ Novo Funcionário</div>
      <div className="fg"><label className="fl">Nome</label><input className="fi" value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))}/></div>
      <div className="fg"><label className="fl">Email (login)</label><input className="fi" type="email" value={f.email} onChange={e=>setF(x=>({...x,email:e.target.value}))}/></div>
      <div className="fr2"><div className="fg"><label className="fl">Senha</label><input className="fi" type="password" value={f.password} onChange={e=>setF(x=>({...x,password:e.target.value}))}/></div><div className="fg"><label className="fl">Perfil</label><select className="fs" value={f.role} onChange={e=>setF(x=>({...x,role:e.target.value}))}><option value="func">Funcionário</option><option value="admin">Admin</option></select></div></div>
      <button className="btn brose bfull" disabled={!f.name||!f.email||f.password.length<6} onClick={add}>+ Cadastrar</button>
    </div>
    <div className="card">
      <div style={{fontWeight:700,marginBottom:10}}>🔒 Alterar minha senha</div>
      <div className="fg"><label className="fl">Senha atual</label><input className="fi" type="password" value={pf.cur} onChange={e=>setPF(x=>({...x,cur:e.target.value}))}/></div>
      <div className="fr2"><div className="fg"><label className="fl">Nova senha</label><input className="fi" type="password" value={pf.n} onChange={e=>setPF(x=>({...x,n:e.target.value}))}/></div><div className="fg"><label className="fl">Confirmar</label><input className="fi" type="password" value={pf.c} onChange={e=>setPF(x=>({...x,c:e.target.value}))}/></div></div>
      {pe&&<div style={{color:'var(--red)',fontSize:12,marginBottom:8}}>{pe}</div>}
      {po&&<div style={{background:'var(--gl)',color:'#2E7D52',borderRadius:8,padding:'8px 12px',marginBottom:8,fontSize:12}}>✓ Alterada!</div>}
      <button className="btn bghost bfull" onClick={chg}>Alterar senha</button>
    </div>
  </div>);
}

/* ─── APP ROOT ─────────────────────────────────────── */
function App(){
  const [user,setUser]     =useDB('slp_user_v6',null);
  const [tab,setTab]       =useState('dash');
  const [cfg,setCfg]       =useDB('slp_cfg_v6',CFG0);
  const [cats,setCats]     =useDB('slp_cats_v6',CATS0);
  const [prods,setProds]   =useCloudDB('produtos','slp_prods_v6',[]);
  const [vars,setVars]     =useCloudDB('variacoes','slp_vars_v6',[],ROW_VARIACOES);
  const [clis,setClis]     =useCloudDB('clientes','slp_clis_v6',[],ROW_CLIENTES);
  const [vendas,setVendas] =useCloudDB('vendas','slp_vendas_v6',[],ROW_VENDAS);
  const [txs,setTxs]       =useCloudDB('transacoes','slp_txs_v6',[]);
  const [contas,setContas] =useCloudDB('contas','slp_contas_v6',[],ROW_CONTAS);

  const nav=(t)=>setTab(t);

  if(!user) return <Login onLogin={setUser}/>;

  const TABS=[
    {id:'dash',  ico:'🏠',l:'Início'},
    {id:'pdv',   ico:'🛒',l:'Venda'},
    {id:'compras',ico:'📥',l:'Compras'},
    {id:'estoque',ico:'📦',l:'Estoque'},
    {id:'clis',  ico:'👥',l:'Clientes'},
    {id:'fin',   ico:'📊',l:'Financeiro'},
    {id:'aj',    ico:'⚙️',l:'Ajustes'},
  ];

  return(<div className="shell">
    <div className="topbar">
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {cfg.logo&&<img src={cfg.logo} style={{height:26,objectFit:'contain',borderRadius:5}} alt=""/>}
        <div className="logo">Studio <em>Luar</em> Pro</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:12,color:'var(--ink3)',fontWeight:500}}>{user.name}</span>
        <Avatar name={user.initials||user.name} size={30}/>
      </div>
    </div>
    <div className="page">
      {tab==='dash'   &&<Dashboard vendas={vendas} vars={vars} clientes={clis} contas={contas} cfg={cfg} nav={nav}/>}
      {tab==='pdv'    &&<PDV prods={prods} vars={vars} setVars={setVars} clis={clis} setClis={setClis} vendas={vendas} setVendas={setVendas} txs={txs} setTxs={setTxs} cfg={cfg}/>}
      {tab==='compras'&&<Compras prods={prods} setProds={setProds} vars={vars} setVars={setVars} cats={cats} setTxs={setTxs}/>}
      {tab==='estoque'&&<Estoque prods={prods} vars={vars} cats={cats}/>}
      {tab==='clis'   &&<Clientes clis={clis} setClis={setClis} vendas={vendas}/>}
      {tab==='fin'    &&<Financeiro txs={txs} setTxs={setTxs} contas={contas} setContas={setContas} vendas={vendas} clis={clis}/>}
      {tab==='aj'     &&<Ajustes cfg={cfg} setCfg={setCfg} prods={prods} setProds={setProds} vars={vars} setVars={setVars} cats={cats} setCats={setCats} user={user} onLogout={()=>setUser(null)}/>}
    </div>
    <nav className="bnav">
      {TABS.map(t=>(
        <button key={t.id} className={`nbtn ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
          <span className="ni">{t.ico}</span><span>{t.l}</span>
        </button>
      ))}
    </nav>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
